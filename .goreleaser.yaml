version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: churn
    main: ./cmd/churn
    binary: churn
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt
